<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>无尽冬日炉子地图</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071321;
      --panel: rgba(11, 25, 42, 0.82);
      --panel-strong: rgba(9, 22, 37, 0.94);
      --line: rgba(95, 222, 255, 0.48);
      --line-soft: rgba(95, 222, 255, 0.18);
      --text: #eef8ff;
      --muted: #98b7cb;
      --cyan: #4fdaf7;
      --blue: #42aaf7;
      --good: rgba(84, 239, 144, 0.52);
      --bad: rgba(255, 87, 87, 0.6);
      --warn: #ffcf5b;
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 22% 18%, rgba(64, 164, 231, 0.18), transparent 28rem),
        radial-gradient(circle at 80% 34%, rgba(65, 225, 247, 0.1), transparent 32rem),
        linear-gradient(180deg, #081728 0%, #0d1827 52%, #101724 100%);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem clamp(0.85rem, 2vw, 1.4rem);
      background: linear-gradient(180deg, rgba(5, 15, 28, 0.94), rgba(7, 18, 32, 0.78));
      border-bottom: 1px solid rgba(117, 215, 255, 0.18);
      backdrop-filter: blur(12px);
    }

    .brand {
      min-width: 0;
      display: grid;
      gap: 0.12rem;
    }

    .brand strong {
      font-size: clamp(1rem, 2.5vw, 1.22rem);
      font-weight: 500;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand span {
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.55rem;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 2.35rem;
      border: 1px solid rgba(115, 211, 255, 0.24);
      border-radius: 0.5rem;
      color: var(--text);
      background: rgba(18, 42, 64, 0.86);
      padding: 0.52rem 0.78rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.42rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .btn:hover {
      border-color: rgba(112, 226, 255, 0.5);
      background: rgba(24, 57, 82, 0.96);
    }

    .btn.primary {
      color: #052134;
      border-color: rgba(149, 244, 255, 0.7);
      background: linear-gradient(180deg, #75ecff, #44b8fb);
      box-shadow: 0 7px 24px rgba(57, 196, 255, 0.28);
    }

    .btn.danger {
      border-color: rgba(255, 132, 132, 0.35);
      background: rgba(70, 31, 40, 0.88);
    }

    .status {
      min-width: min(100%, 16rem);
      color: var(--muted);
      font-size: 0.9rem;
      text-align: right;
    }

    .stage {
      min-height: 0;
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: clamp(0.5rem, 2vw, 1.25rem);
    }

    .map-shell {
      width: min(100%, 1160px);
      height: min(calc(100vh - 6.1rem), 760px);
      min-height: 520px;
      position: relative;
      border: 1px solid rgba(101, 210, 255, 0.18);
      border-radius: 0.75rem;
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.08), transparent 7rem),
        radial-gradient(circle at 78% 70%, rgba(92, 209, 255, 0.08), transparent 14rem),
        linear-gradient(135deg, rgba(151, 176, 211, 0.82), rgba(116, 137, 174, 0.9));
      box-shadow: var(--shadow);
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    .map-shell.placing {
      cursor: crosshair;
    }

    .map-shell.panning {
      cursor: grabbing;
    }

    .map-shell:not(.placing) {
      cursor: grab;
    }

    .map {
      width: 100%;
      height: 100%;
      display: block;
    }

    .snow {
      fill: rgba(255, 255, 255, 0.08);
    }

    .terrain-line {
      fill: none;
      stroke: rgba(76, 217, 241, 0.22);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .map-boundary {
      fill: rgba(185, 204, 235, 0.2);
      stroke: rgba(112, 226, 255, 0.28);
      stroke-width: 3;
    }

    .grid-lines line {
      stroke: var(--line);
      stroke-width: 1.1;
      vector-effect: non-scaling-stroke;
    }

    .grid-lines .major {
      stroke: rgba(123, 233, 255, 0.72);
      stroke-width: 1.45;
    }

    .grid-lines {
      opacity: 0;
      transition: opacity 150ms ease;
      pointer-events: none;
    }

    .grid-visible .grid-lines,
    .placing .grid-lines {
      opacity: 1;
    }

    .cell-preview polygon {
      stroke: rgba(255, 255, 255, 0.72);
      stroke-width: 1.4;
      vector-effect: non-scaling-stroke;
    }

    .cell-preview .ok {
      fill: var(--good);
    }

    .cell-preview .blocked {
      fill: var(--bad);
    }

    .furnace-footprint {
      fill: rgba(40, 170, 235, 0.16);
      stroke: rgba(101, 234, 255, 0.34);
      stroke-width: 1.6;
      vector-effect: non-scaling-stroke;
    }

    .furnace-preview {
      opacity: 0.86;
      filter: drop-shadow(0 10px 14px rgba(0, 0, 0, 0.38));
      pointer-events: none;
    }

    .furnace-preview.invalid {
      opacity: 0.62;
      filter: drop-shadow(0 10px 14px rgba(0, 0, 0, 0.38)) saturate(0.55);
    }

    .furnace {
      filter: drop-shadow(0 12px 11px rgba(0, 0, 0, 0.38));
      cursor: grab;
      pointer-events: visiblePainted;
    }

    .furnace:active {
      cursor: grabbing;
    }

    .furnace .body,
    .furnace-preview .body {
      fill: url(#iceBody);
      stroke: #12384c;
      stroke-width: 3;
      stroke-linejoin: round;
    }

    .furnace .roof,
    .furnace-preview .roof {
      fill: url(#iceRoof);
      stroke: #174966;
      stroke-width: 3;
      stroke-linejoin: round;
    }

    .furnace .core,
    .furnace-preview .core {
      fill: #e23527;
      stroke: #ffd86d;
      stroke-width: 4;
    }

    .furnace .spark,
    .furnace-preview .spark {
      fill: #dffaff;
      opacity: 0.92;
    }

    .floating-hint {
      position: absolute;
      left: 50%;
      bottom: 1rem;
      transform: translateX(-50%);
      max-width: min(calc(100% - 1.5rem), 38rem);
      padding: 0.55rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(115, 211, 255, 0.2);
      background: var(--panel);
      color: var(--text);
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.35;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.8rem;
      height: 1.8rem;
      border-radius: 999px;
      background: rgba(10, 29, 48, 0.85);
      border: 1px solid rgba(121, 229, 255, 0.3);
      color: var(--cyan);
      font-variant-numeric: tabular-nums;
    }

    .map-label {
      fill: rgba(214, 252, 255, 0.72);
      font-size: 20px;
      font-weight: 500;
      text-anchor: middle;
      paint-order: stroke;
      stroke: rgba(8, 25, 38, 0.62);
      stroke-width: 5;
    }

    .mini {
      position: absolute;
      right: 1rem;
      top: 1rem;
      width: min(15rem, 34vw);
      min-width: 8.5rem;
      aspect-ratio: 1.5 / 1;
      border-radius: 0.55rem;
      border: 1px solid rgba(188, 221, 255, 0.18);
      background: rgba(45, 58, 84, 0.38);
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .mini::before {
      content: "";
      width: 62%;
      aspect-ratio: 1;
      transform: rotate(45deg) skew(-8deg, -8deg);
      background: rgba(8, 22, 38, 0.24);
    }

    .zoom-controls {
      position: absolute;
      left: 1rem;
      top: 1rem;
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem;
      border: 1px solid rgba(115, 211, 255, 0.2);
      border-radius: 0.6rem;
      background: var(--panel);
      backdrop-filter: blur(10px);
    }

    .zoom-btn {
      width: 2.15rem;
      min-height: 2.15rem;
      padding: 0;
      justify-content: center;
      font-size: 1.1rem;
      line-height: 1;
    }

    .zoom-level {
      min-width: 3.25rem;
      color: var(--text);
      font-size: 0.86rem;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 720px) {
      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .brand span {
        white-space: normal;
      }

      .actions {
        justify-content: flex-start;
      }

      .status {
        min-width: 100%;
        text-align: left;
      }

      .map-shell {
        min-height: 560px;
        height: calc(100vh - 12.5rem);
        border-radius: 0.55rem;
      }

      .btn {
        flex: 1 1 auto;
        justify-content: center;
      }

      .mini {
        width: 8.5rem;
        right: 0.55rem;
        top: 0.55rem;
      }

      .zoom-controls {
        left: 0.55rem;
        top: 0.55rem;
      }

      .floating-hint {
        border-radius: 0.55rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="toolbar">
      <div class="brand">
        <strong>无尽冬日炉子地图</strong>
        <span>40×40 斜投影地图，炉子固定占 2×2 格</span>
      </div>
      <div class="actions" aria-label="地图操作">
        <button class="btn primary" id="placeBtn" type="button">放置炉子</button>
        <button class="btn" id="gridBtn" type="button">显示格子</button>
        <button class="btn" id="footprintBtn" type="button">隐藏占格</button>
        <button class="btn danger" id="clearBtn" type="button">清空</button>
        <div class="status" id="status">已放置 <span class="badge" id="count">0</span> 个炉子</div>
      </div>
    </header>

    <section class="stage" aria-label="炉子地图编辑区">
      <div class="map-shell" id="mapShell">
        <svg class="map" id="mapSvg" viewBox="-105 -465 1580 1395" role="img" aria-label="倾斜的无尽冬日炉子地图">
          <defs>
            <linearGradient id="iceBody" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e4fbff"/>
              <stop offset="45%" stop-color="#6bcffc"/>
              <stop offset="100%" stop-color="#247ac6"/>
            </linearGradient>
            <linearGradient id="iceRoof" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f5ffff"/>
              <stop offset="55%" stop-color="#84ddff"/>
              <stop offset="100%" stop-color="#3396d9"/>
            </linearGradient>
            <radialGradient id="frost" cx="48%" cy="35%" r="70%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
              <stop offset="45%" stop-color="rgba(145,215,255,0.55)"/>
              <stop offset="100%" stop-color="rgba(63,121,177,0.2)"/>
            </radialGradient>
          </defs>

          <g id="terrain"></g>
          <polygon class="map-boundary" id="mapBoundary"></polygon>
          <g class="grid-lines" id="gridLines"></g>
          <g id="footprints"></g>
          <g id="previewCells" class="cell-preview"></g>
          <g id="furnaces"></g>
          <g id="previewFurnace"></g>
        </svg>
        <div class="mini" aria-hidden="true"></div>
        <div class="zoom-controls" aria-label="缩放地图">
          <button class="btn zoom-btn" id="zoomOutBtn" type="button" aria-label="缩小地图">−</button>
          <span class="zoom-level" id="zoomLevel">100%</span>
          <button class="btn zoom-btn" id="zoomInBtn" type="button" aria-label="放大地图">+</button>
          <button class="btn zoom-btn" id="zoomResetBtn" type="button" aria-label="重置地图缩放">↺</button>
        </div>
        <div class="floating-hint" id="hint">点击地图显示或隐藏格子线；点击“放置炉子”后拖到绿色 2×2 区域松手放下。</div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const size = 40;
      const cell = 24;
      const angleX = -21 * Math.PI / 180;
      const angleY = 61 * Math.PI / 180;
      const vx = { x: Math.cos(angleX) * cell, y: Math.sin(angleX) * cell };
      const vy = { x: Math.cos(angleY) * cell, y: Math.sin(angleY) * cell };

      const mapShell = document.getElementById("mapShell");
      const mapSvg = document.getElementById("mapSvg");
      const gridLines = document.getElementById("gridLines");
      const mapBoundary = document.getElementById("mapBoundary");
      const terrain = document.getElementById("terrain");
      const footprints = document.getElementById("footprints");
      const furnaces = document.getElementById("furnaces");
      const previewCells = document.getElementById("previewCells");
      const previewFurnace = document.getElementById("previewFurnace");
      const placeBtn = document.getElementById("placeBtn");
      const gridBtn = document.getElementById("gridBtn");
      const footprintBtn = document.getElementById("footprintBtn");
      const clearBtn = document.getElementById("clearBtn");
      const zoomOutBtn = document.getElementById("zoomOutBtn");
      const zoomInBtn = document.getElementById("zoomInBtn");
      const zoomResetBtn = document.getElementById("zoomResetBtn");
      const zoomLevel = document.getElementById("zoomLevel");
      const status = document.getElementById("status");
      const hint = document.getElementById("hint");

      const occupied = new Set();
      const placed = [];
      const baseViewBox = { x: -105, y: -465, w: 1580, h: 1395 };
      const minZoom = 0.75;
      const maxZoom = 4;
      let viewBox = { ...baseViewBox };
      let zoom = 1;
      let gridVisible = false;
      let footprintsVisible = true;
      let placing = false;
      let pointerDown = false;
      let panning = false;
      let panStart = null;
      let viewBoxStart = null;
      let dragMode = "none";
      let draggingPlacedIndex = null;
      let currentCandidate = null;
      let suppressNextMapClick = false;

      const svgNS = "http://www.w3.org/2000/svg";

      function point(gx, gy) {
        return {
          x: gx * vx.x + gy * vy.x,
          y: gx * vx.y + gy * vy.y
        };
      }

      function polygonPoints(points) {
        return points.map((p) => `${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(" ");
      }

      function cellPolygon(gx, gy) {
        return polygonPoints([
          point(gx, gy),
          point(gx + 1, gy),
          point(gx + 1, gy + 1),
          point(gx, gy + 1)
        ]);
      }

      function footprintPolygon(gx, gy) {
        return polygonPoints([
          point(gx, gy),
          point(gx + 2, gy),
          point(gx + 2, gy + 2),
          point(gx, gy + 2)
        ]);
      }

      function centerOf(gx, gy, w = 2, h = 2) {
        return point(gx + w / 2, gy + h / 2);
      }

      function key(gx, gy) {
        return `${gx}:${gy}`;
      }

      function svgPointFromEvent(event) {
        const pt = mapSvg.createSVGPoint();
        pt.x = event.clientX;
        pt.y = event.clientY;
        const matrix = mapSvg.getScreenCTM();
        if (!matrix) return null;
        return pt.matrixTransform(matrix.inverse());
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function applyViewBox() {
        mapSvg.setAttribute("viewBox", `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
        zoomLevel.textContent = `${Math.round(zoom * 100)}%`;
      }

      function setZoom(nextZoom, anchor = null) {
        const newZoom = clamp(nextZoom, minZoom, maxZoom);
        const ratioX = anchor ? (anchor.x - viewBox.x) / viewBox.w : 0.5;
        const ratioY = anchor ? (anchor.y - viewBox.y) / viewBox.h : 0.5;
        const nextW = baseViewBox.w / newZoom;
        const nextH = baseViewBox.h / newZoom;
        zoom = newZoom;
        viewBox = {
          x: (anchor ? anchor.x : viewBox.x + viewBox.w / 2) - nextW * ratioX,
          y: (anchor ? anchor.y : viewBox.y + viewBox.h / 2) - nextH * ratioY,
          w: nextW,
          h: nextH
        };
        applyViewBox();
      }

      function resetZoom() {
        zoom = 1;
        viewBox = { ...baseViewBox };
        applyViewBox();
      }

      function candidateAtViewCenter() {
        return clampCandidate(gridFromSvgPoint({
          x: viewBox.x + viewBox.w / 2,
          y: viewBox.y + viewBox.h / 2
        }));
      }

      function gridFromSvgPoint(p) {
        const det = vx.x * vy.y - vy.x * vx.y;
        const gx = (p.x * vy.y - vy.x * p.y) / det;
        const gy = (vx.x * p.y - p.x * vx.y) / det;
        return { gx, gy };
      }

      function clampCandidate(raw) {
        return {
          gx: Math.floor(raw.gx),
          gy: Math.floor(raw.gy)
        };
      }

      function cellsFor(gx, gy) {
        return [
          { gx, gy },
          { gx: gx + 1, gy },
          { gx, gy: gy + 1 },
          { gx: gx + 1, gy: gy + 1 }
        ];
      }

      function ignoredCellsFor(index) {
        if (index === null || index < 0 || !placed[index]) return new Set();
        const item = placed[index];
        return new Set(cellsFor(item.gx, item.gy).map((cellItem) => key(cellItem.gx, cellItem.gy)));
      }

      function cellState(gx, gy, ignoreCells = null) {
        if (gx < 0 || gy < 0 || gx >= size || gy >= size) return "blocked";
        if (ignoreCells && ignoreCells.has(key(gx, gy))) return "ok";
        return occupied.has(key(gx, gy)) ? "blocked" : "ok";
      }

      function candidateIsValid(candidate, ignoreCells = null) {
        if (!candidate) return false;
        return cellsFor(candidate.gx, candidate.gy).every((cellItem) => cellState(cellItem.gx, cellItem.gy, ignoreCells) === "ok");
      }

      function setGridVisible(next) {
        gridVisible = next;
        mapShell.classList.toggle("grid-visible", gridVisible);
        gridBtn.textContent = gridVisible ? "隐藏格子" : "显示格子";
      }

      function setFootprintsVisible(next) {
        footprintsVisible = next;
        footprints.style.display = footprintsVisible ? "" : "none";
        footprintBtn.textContent = footprintsVisible ? "隐藏占格" : "显示占格";
      }

      function setPlacing(next) {
        placing = next;
        pointerDown = false;
        dragMode = "none";
        draggingPlacedIndex = null;
        panning = false;
        mapShell.classList.remove("panning");
        currentCandidate = null;
        mapShell.classList.toggle("placing", placing);
        placeBtn.classList.toggle("primary", !placing);
        placeBtn.textContent = placing ? "取消放置" : "放置炉子";
        if (placing) {
          setGridVisible(true);
          drawPreview(candidateAtViewCenter());
          hint.textContent = "拖动炉子预览位置：四个格子全为绿色时，松手即可放置。";
        } else {
          previewCells.replaceChildren();
          previewFurnace.replaceChildren();
          hint.textContent = "点击地图显示或隐藏格子线；点击“放置炉子”后拖到绿色 2×2 区域松手放下。";
        }
      }

      function updateStatus() {
        const ignoreCells = ignoredCellsFor(draggingPlacedIndex);
        if (placing && currentCandidate) {
          status.innerHTML = candidateIsValid(currentCandidate, ignoreCells)
            ? `当前位置可放置，已放置 <span class="badge" id="count">${placed.length}</span> 个炉子`
            : `当前位置不可放置，已放置 <span class="badge" id="count">${placed.length}</span> 个炉子`;
        } else {
          status.innerHTML = `已放置 <span class="badge" id="count">${placed.length}</span> 个炉子`;
        }
      }

      function createSvgElement(tag, attrs = {}) {
        const el = document.createElementNS(svgNS, tag);
        Object.entries(attrs).forEach(([name, value]) => el.setAttribute(name, value));
        return el;
      }

      function drawMapBase() {
        const corners = [point(0, 0), point(size, 0), point(size, size), point(0, size)];
        mapBoundary.setAttribute("points", polygonPoints(corners));

        const lines = [];
        for (let i = 0; i <= size; i += 1) {
          const a = point(i, 0);
          const b = point(i, size);
          const c = point(0, i);
          const d = point(size, i);
          lines.push(createSvgElement("line", {
            x1: a.x, y1: a.y, x2: b.x, y2: b.y,
            class: i % 5 === 0 ? "major" : ""
          }));
          lines.push(createSvgElement("line", {
            x1: c.x, y1: c.y, x2: d.x, y2: d.y,
            class: i % 5 === 0 ? "major" : ""
          }));
        }
        gridLines.replaceChildren(...lines);

        const terrainNodes = [];
        const snowSeeds = [
          [4, 5, 60, 25], [13, 9, 92, 36], [28, 7, 70, 24],
          [8, 22, 75, 34], [22, 21, 105, 40], [34, 26, 82, 28],
          [15, 35, 95, 32], [31, 36, 62, 25]
        ];
        snowSeeds.forEach(([gx, gy, rx, ry]) => {
          const p = point(gx, gy);
          const e = createSvgElement("ellipse", {
            class: "snow",
            cx: p.x,
            cy: p.y,
            rx,
            ry,
            transform: `rotate(-21 ${p.x} ${p.y})`
          });
          terrainNodes.push(e);
        });

        const paths = [
          [[3, 18], [12, 17], [22, 14], [35, 15]],
          [[8, 31], [15, 25], [26, 24], [38, 20]],
          [[2, 8], [11, 13], [20, 12], [30, 18], [37, 22]]
        ];
        paths.forEach((segments) => {
          const d = segments.map(([gx, gy], index) => {
            const p = point(gx, gy);
            return `${index === 0 ? "M" : "L"} ${p.x.toFixed(2)} ${p.y.toFixed(2)}`;
          }).join(" ");
          terrainNodes.push(createSvgElement("path", { class: "terrain-line", d }));
        });

        terrain.replaceChildren(...terrainNodes);
      }

      function furnaceGraphic(className, cx, cy, scale, invalid = false, index = null) {
        const group = createSvgElement("g", {
          class: `${className}${invalid ? " invalid" : ""}`,
          transform: `translate(${cx.toFixed(2)} ${cy.toFixed(2)}) scale(${scale})`
        });
        if (index !== null) {
          group.dataset.index = String(index);
        }

        const shadow = createSvgElement("ellipse", {
          cx: 0,
          cy: 31,
          rx: 34,
          ry: 11,
          fill: "rgba(2, 16, 28, 0.42)"
        });
        const base = createSvgElement("path", {
          class: "body",
          d: "M -30 2 L -17 -17 L 17 -17 L 30 2 L 24 32 L -24 32 Z"
        });
        const roof = createSvgElement("path", {
          class: "roof",
          d: "M -22 -15 L 0 -35 L 24 -15 L 13 1 L -12 1 Z"
        });
        const chimney = createSvgElement("path", {
          class: "roof",
          d: "M 11 -30 L 21 -24 L 19 -8 L 9 -12 Z"
        });
        const core = createSvgElement("circle", { class: "core", cx: 0, cy: 12, r: 16 });
        const spark1 = createSvgElement("circle", { class: "spark", cx: -14, cy: -7, r: 4 });
        const spark2 = createSvgElement("circle", { class: "spark", cx: 17, cy: -2, r: 3 });
        const spark3 = createSvgElement("circle", { class: "spark", cx: 3, cy: -21, r: 3.5 });
        group.append(shadow, chimney, base, roof, spark1, spark2, spark3, core);
        return group;
      }

      function drawPreview(candidate) {
        previewCells.replaceChildren();
        previewFurnace.replaceChildren();
        currentCandidate = candidate;
        if (!candidate) {
          updateStatus();
          return;
        }

        const ignoreCells = ignoredCellsFor(draggingPlacedIndex);
        const nodes = cellsFor(candidate.gx, candidate.gy).map((cellItem) => {
          const state = cellState(cellItem.gx, cellItem.gy, ignoreCells);
          return createSvgElement("polygon", {
            points: cellPolygon(cellItem.gx, cellItem.gy),
            class: state
          });
        });
        previewCells.replaceChildren(...nodes);

        const c = centerOf(candidate.gx, candidate.gy);
        previewFurnace.appendChild(furnaceGraphic("furnace-preview", c.x, c.y - 19, 0.68, !candidateIsValid(candidate, ignoreCells)));
        updateStatus();
      }

      function renderPlaced() {
        const footprintNodes = [];
        const furnaceNodes = [];
        placed.forEach((item, index) => {
          if (index === draggingPlacedIndex) return;
          footprintNodes.push(createSvgElement("polygon", {
            class: "furnace-footprint",
            points: footprintPolygon(item.gx, item.gy)
          }));
          const c = centerOf(item.gx, item.gy);
          furnaceNodes.push(furnaceGraphic("furnace", c.x, c.y - 19, 0.68, false, index));
        });
        footprints.replaceChildren(...footprintNodes);
        furnaces.replaceChildren(...furnaceNodes);
        updateStatus();
      }

      function placeAt(candidate, movingIndex = null) {
        const ignoreCells = ignoredCellsFor(movingIndex);
        if (!candidateIsValid(candidate, ignoreCells)) {
          hint.textContent = "这里不能放置：2×2 区域中有红格，或已经与其他炉子重叠。";
          return false;
        }
        if (movingIndex !== null && placed[movingIndex]) {
          cellsFor(placed[movingIndex].gx, placed[movingIndex].gy).forEach((cellItem) => occupied.delete(key(cellItem.gx, cellItem.gy)));
          placed[movingIndex] = { gx: candidate.gx, gy: candidate.gy };
        } else {
          placed.push({ gx: candidate.gx, gy: candidate.gy });
        }
        cellsFor(candidate.gx, candidate.gy).forEach((cellItem) => occupied.add(key(cellItem.gx, cellItem.gy)));
        return true;
      }

      function panTo(event) {
        const dx = event.clientX - panStart.x;
        const dy = event.clientY - panStart.y;
        const rect = mapSvg.getBoundingClientRect();
        viewBox = {
          x: viewBoxStart.x - dx * viewBoxStart.w / rect.width,
          y: viewBoxStart.y - dy * viewBoxStart.h / rect.height,
          w: viewBoxStart.w,
          h: viewBoxStart.h
        };
        applyViewBox();
      }

      function candidateFromPointer(event) {
        const p = svgPointFromEvent(event);
        if (!p) return null;
        return clampCandidate(gridFromSvgPoint(p));
      }

      function handlePointerMove(event) {
        if (dragMode === "pan" && panning) {
          event.preventDefault();
          panTo(event);
          return;
        }
        if (dragMode === "place" || dragMode === "move") {
          event.preventDefault();
          drawPreview(candidateFromPointer(event));
        }
      }

      function handlePointerDown(event) {
        if (event.target.closest("button")) return;
        const furnaceEl = event.target.closest(".furnace");
        event.preventDefault();
        suppressNextMapClick = true;
        pointerDown = true;
        mapShell.setPointerCapture(event.pointerId);
        if (furnaceEl) {
          draggingPlacedIndex = Number(furnaceEl.dataset.index);
          dragMode = "move";
          setGridVisible(true);
          renderPlaced();
          drawPreview(candidateFromPointer(event));
          hint.textContent = "正在移动已放置的炉子：四个格子全为绿色时，松手即可放下。";
          return;
        }
        if (placing) {
          dragMode = "place";
          drawPreview(candidateFromPointer(event));
          return;
        }
        dragMode = "pan";
        panning = true;
        panStart = { x: event.clientX, y: event.clientY };
        viewBoxStart = { ...viewBox };
        mapShell.classList.add("panning");
      }

      function handlePointerUp(event) {
        if (!pointerDown) return;
        event.preventDefault();
        pointerDown = false;
        if (dragMode === "pan") {
          panning = false;
          mapShell.classList.remove("panning");
          dragMode = "none";
          return;
        }
        if (dragMode === "place" || dragMode === "move") {
          const movingIndex = dragMode === "move" ? draggingPlacedIndex : null;
          const candidate = candidateFromPointer(event) || currentCandidate;
          drawPreview(candidate);
          const placedOk = placeAt(candidate, movingIndex);
          if (placedOk) {
            draggingPlacedIndex = null;
            dragMode = "none";
            renderPlaced();
            setPlacing(false);
            setGridVisible(false);
          } else {
            draggingPlacedIndex = null;
            renderPlaced();
            if (dragMode === "move") {
              setGridVisible(false);
              previewCells.replaceChildren();
              previewFurnace.replaceChildren();
              hint.textContent = "移动取消：目标位置不能放置。";
            }
          }
        }
        dragMode = "none";
        draggingPlacedIndex = null;
      }

      mapShell.addEventListener("click", (event) => {
        if (suppressNextMapClick) {
          suppressNextMapClick = false;
          return;
        }
        if (placing) return;
        if (event.target.closest("button")) return;
        setGridVisible(!gridVisible);
      });

      mapShell.addEventListener("pointermove", handlePointerMove);
      mapShell.addEventListener("pointerdown", handlePointerDown);
      mapShell.addEventListener("pointerup", handlePointerUp);
      mapShell.addEventListener("pointercancel", () => {
        pointerDown = false;
      });

      mapShell.addEventListener("wheel", (event) => {
        event.preventDefault();
        const anchor = svgPointFromEvent(event);
        const factor = event.deltaY < 0 ? 1.12 : 1 / 1.12;
        setZoom(zoom * factor, anchor);
      }, { passive: false });

      placeBtn.addEventListener("click", () => {
        setPlacing(!placing);
      });

      gridBtn.addEventListener("click", () => {
        if (!placing) setGridVisible(!gridVisible);
      });

      footprintBtn.addEventListener("click", () => {
        setFootprintsVisible(!footprintsVisible);
      });

      clearBtn.addEventListener("click", () => {
        occupied.clear();
        placed.splice(0, placed.length);
        renderPlaced();
        previewCells.replaceChildren();
        previewFurnace.replaceChildren();
        if (placing) {
          hint.textContent = "地图已清空。拖动炉子预览位置，绿色 2×2 区域可以放置。";
        } else {
          hint.textContent = "地图已清空。点击地图显示或隐藏格子线。";
        }
      });

      zoomOutBtn.addEventListener("click", () => {
        setZoom(zoom / 1.25);
      });

      zoomInBtn.addEventListener("click", () => {
        setZoom(zoom * 1.25);
      });

      zoomResetBtn.addEventListener("click", () => {
        resetZoom();
      });

      drawMapBase();
      renderPlaced();
      applyViewBox();
      setGridVisible(false);
      setFootprintsVisible(true);
    })();
  </script>
</body>
</html>
